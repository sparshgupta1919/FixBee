<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/fixbee-logo.svg" />
    <link rel="preload" href="/fixbee-logo.svg" as="image" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4991ff" />
    <meta name="description" content="FixBee — Report, track, and resolve community issues together." />
    <title>FixBee</title>

    <!-- Prevent flash of unstyled text for icons -->
    <script>
      (function() {
        document.documentElement.classList.add('fonts-loading');
        
        var maxTimeout = setTimeout(function() {
          document.documentElement.classList.remove('fonts-loading');
        }, 2000);

        function checkFonts() {
          var loadedOutlined = false;
          var loadedRounded = false;
          try {
            loadedOutlined = document.fonts.check("24px 'Material Symbols Outlined'");
            loadedRounded = document.fonts.check("24px 'Material Symbols Rounded'");
          } catch(e) {}

          if (loadedOutlined || loadedRounded) {
            clearTimeout(maxTimeout);
            document.documentElement.classList.remove('fonts-loading');
          } else {
            setTimeout(checkFonts, 50);
          }
        }

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(checkFonts).catch(function() {
            clearTimeout(maxTimeout);
            document.documentElement.classList.remove('fonts-loading');
          });
        } else {
          clearTimeout(maxTimeout);
          document.documentElement.classList.remove('fonts-loading');
        }
      })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
